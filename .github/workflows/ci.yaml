name: CI (Lint & Test)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  install-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

  lint:
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Nx set base and head
        uses: nrwl/nx-set-shas@v4

      - name: Run Lint
        run: npx nx affected:lint

  unit-test:
   runs-on: ubuntu-latest
   needs: install-deps
   steps:
     - name: Checkout
       uses: actions/checkout@v4
       with:
         fetch-depth: 0
     - name: Setup Node.js
       uses: actions/setup-node@v4
       with:
         node-version: 20
         cache: 'npm'
     - name: Install dependencies
       run: npm ci
     - name: Nx set base and head
       uses: nrwl/nx-set-shas@v4
     - name: Run Tests
       run: npx nx affected:test
