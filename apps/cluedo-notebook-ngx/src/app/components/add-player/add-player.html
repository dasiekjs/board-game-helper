<h2 mat-dialog-title>{{'add-player.title' | transloco}}</h2>
<mat-dialog-content>
  <mat-form-field appearance="outline" subscriptSizing="fixed" class="py-2 input-player-name w-full">
    <mat-label>{{'add-player.form.name' | transloco}}</mat-label>
    <input matInput [(ngModel)]="playerName" cdkFocusInitial (keyup.enter)="addNewPlayer()"/>
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton (click)="onNoClick()" class="add-player-button">
    {{'add-player.actions.cancel' | transloco}}
  </button>
  <button matButton [mat-dialog-close]="playerName()" class="add-player-button">
    {{'add-player.actions.add' | transloco}}
  </button>
</mat-dialog-actions>
